<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | De LAWS CREATIONS</title>

<link rel="icon" type="image/png" href="../images/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f7f9fc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.thankyou-box{
    background:#fff;
    width:100%;
    max-width:650px;
    padding:60px 40px;
    text-align:center;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.logo{
    width:90px;
    margin-bottom:25px;
}

.success-icon{
    width:100px;
    height:100px;
    margin:0 auto 25px;
    border-radius:50%;
    background:#eaf8ef;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    color:#28a745;
}

h1{
    color:#0F4C81;
    font-size:38px;
    margin-bottom:15px;
}

p{
    color:#666;
    font-size:18px;
    line-height:1.8;
    margin-bottom:35px;
}

.home-btn{
    display:inline-block;
    background:#D4AF37;
    color:#111;
    text-decoration:none;
    padding:16px 38px;
    border-radius:40px;
    font-weight:600;
    transition:.3s;
}

.home-btn:hover{
    background:#0F4C81;
    color:#fff;
    transform:translateY(-3px);
}

</style>

</head>

<body>

<div class="thankyou-box">

    <img src="../images/logo.png" class="logo" alt="Logo">

    <div class="success-icon">
        ✓
    </div>

    <h1>Thank You!</h1>

    <p>
        Your message has been received successfully.<br>
        Thank you for choosing <strong>De LAWS CREATIONS</strong>.<br><br>
        We will get back to you as soon as possible.
    </p>

    <a href="index.html" class="home-btn">
        Return to Home
    </a>

</div>

</body>
</html>
